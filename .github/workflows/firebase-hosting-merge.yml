name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm ci && npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FOOTBALL_DATA_API_KEY: ${{ secrets.VITE_FOOTBALL_DATA_API_KEY }}
      - name: Deploy to Firebase Hosting (live)
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          set +e
          OUTPUT=$(npx firebase-tools@latest deploy --only hosting --project polla-mundialista-bda0e 2>&1)
          STATUS=$?
          echo "$OUTPUT"
          rm -f "$RUNNER_TEMP/firebase-sa.json"
          if [ "$STATUS" -ne 0 ] && echo "$OUTPUT" | grep -q "is the current active version"; then
            echo "::warning::Release retry hit a 'current active version' precondition. The version already went live, so this is treated as success."
            exit 0
          fi
          exit "$STATUS"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_POLLA_MUNDIALISTA_BDA0E }}
